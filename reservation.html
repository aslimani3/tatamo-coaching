<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tatamo Coaching - Fanja Rajery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<section class="reservation">
    <div class="container hero-content">
      <h3 class="hero-title">Formulaire de réservation</h3>
       
      <main class="page-reservation">
    <form class="form" action="#" method="post">
      <div class="form-group">
        
        <input type="text" id="fullName" name="fullName" placeholder="Nom complet" required />
      </div>
<br>
      <div class="form-group">
        
        <input type="email" id="email" name="email" placeholder="Adresse email" required />
      </div>
<br>
      <div class="form-group">
        
        <input type="tel" id="phone" name="phone" placeholder="Numéro de téléphone" required />
      </div>
<br>
      <div class="form-group">
        
        <input type="text" id="country" name="country" placeholder="Pays" required />
      </div>

      <br>

      <div class="form-group">
        
        <select id="province" name="province" required>
          <option value="" disabled selected>Province</option>
          <option>Québec</option>
          <option>Ontario</option>
          <option>Alberta</option>
          <option>Colombie-Britannique</option>
          <option>Autre</option>
        </select>
      </div>

      <button type="submit" class="btn-confirm">Confirmer la réservation</button>
    </form>
  </section>
</main>










<footer class="footer">
    <div class="container">
      <p class="footer-text">© 2026 Tatamo Coaching. Tous droits réservés.</p>
    </div>
  </footer>

  <script type="module" src="script.js"></script>
